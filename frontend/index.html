<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DANIELA v0.5 — BCH Villa Colony Resort</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ───────── HEADER ───────── -->
  <header class="top-bar">
    <div class="brand">
      <h1>DANIELA</h1>
      <span class="subtitle">BCH Villa Colony Resort &middot; Kempinski</span>
    </div>
    <div class="header-right">
      <div class="health-pills">
        <span class="pill" id="pill-sim">Simulator</span>
        <span class="pill" id="pill-db">Database</span>
        <span class="pill" id="pill-key">API Key</span>
      </div>
      <span class="clock" id="clock">--:--:--</span>
    </div>
  </header>

  <!-- ───────── FEED ───────── -->
  <main class="feed" id="feed">
    <div class="feed-empty" id="feed-empty">
      Daniela is monitoring 1,438 BMS points&hellip;<br>
      <span class="feed-empty-sub">Alerts will appear here automatically.</span>
    </div>
  </main>

  <!-- ───────── INPUT BAR ───────── -->
  <footer class="input-bar">
    <form class="input-form" id="input-form">
      <button type="button" class="mic-btn" id="mic-btn" title="Voice input">&#127908;</button>
      <input type="text" id="user-input" placeholder="Ask Daniela anything&hellip;" autocomplete="off">
      <button type="submit" class="send-btn" id="send-btn">&#10148;</button>
    </form>
  </footer>

  <script src="dashboard.js"></script>
</body>
</html>
