version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: daniela-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - influxdb
      - redis

  influxdb:
    image: influxdb:2.7
    container_name: daniela-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123
      - DOCKER_INFLUXDB_INIT_ORG=tiercore
      - DOCKER_INFLUXDB_INIT_BUCKET=daniela
    volumes:
      - influxdb-data:/var/lib/influxdb2

  grafana:
    image: grafana/grafana:latest
    container_name: daniela-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - influxdb

  redis:
    image: redis:alpine
    container_name: daniela-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  influxdb-data:
  grafana-data:
  redis-data:
